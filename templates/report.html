<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: Arial, sans-serif; padding: 20px; border: 1px solid #eee; }
        .header { background-color: #2c3e50; color: white; padding: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .up { color: #27ae60; font-weight: bold; }
        .down { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sentinel Health Report</h1>
            <p>Generated on {{date}}</p>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Website</th>
                    <th>Status</th>
                    <th>Latency</th>
                </tr>
            </thead>
            <tbody>
                {{#each sites}}
                <tr>
                    <td>{{url}}</td>
                    <td><span class="{{#if online}}up{{else}}down{{/if}}">
                        {{#if online}}ACTIVE{{else}}OFFLINE{{/if}}
                    </span></td>
                    <td>{{latency}}</td>
                </tr>
                {{/each}}
            </tbody>
        </table>
    </div>
</body>
</html>
